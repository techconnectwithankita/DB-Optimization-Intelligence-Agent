services:
  - type: web
    name: api-designer-agent
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && npm install && npm run build
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: MOCK_AGENT
        value: "true"
